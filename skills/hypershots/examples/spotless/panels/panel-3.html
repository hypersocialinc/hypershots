<!doctype html><html><head><meta charset="utf-8">
<!-- Assets not included — see README.md. Structure + annotations are the reference. -->
<!-- PANEL 3 of 5 — TRUST / DATA SOURCE. Third of the three panels most store
     visitors ever see: answer "can I believe this?" before asking for the
     install. Official inspections, not crowd reviews. -->
<link rel="stylesheet" href="../fonts.css">
<link rel="stylesheet" href="../frame.css">
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="../profile.css">
</head>
<body>
<div class="panel">
  <div class="wrap" data-protect="copy">
    <div class="eyebrow"><b data-i18n="p3.eyebrow">Straight from the source</b><i></i></div>
    <div class="headline" data-fit data-fit-floor="34" data-i18n="p3.headline">Real inspections,<br>not reviews</div>
    <div class="sub" data-i18n="p3.sub">Official letter grades. Pests on record.</div>
  </div>
  <div class="stage">
    <div class="device" data-protect="device"><div class="screen">
      <!-- REAL capture again — carries its own status bar + island, so no
           .di / .statusbar (see panel-2's note). -->
      <img class="shot" src="../assets/screen-grade.png" alt="">
    </div></div>
    <!-- One sticker only: the letter grade IS the trust argument, so nothing
         competes with it. Right side / +6° continues the alternating rhythm
         (panel 2 ended on the right at 610, this sits higher at 470). -->
    <div class="gradeBadge" style="right:2px;top:470px;transform:rotate(6deg)">A</div>
  </div>
</div>
<script src="../fit.js"></script>
</body></html>
